services:
  - type: web
    name: kingsley-xmd
    env: node
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: SESSION_ID
        sync: false
      - key: OWNER_NUMBER
        sync: false
      - key: BOT_NAME
        value: KINGSLEY-XMD
      - key: PREFIX
        value: "."
      - key: TIMEZONE
        value: Africa/Lagos
      - key: AUTO_READ
        value: "true"
      - key: AUTO_TYPING
        value: "true"
      - key: ANTI_SPAM
        value: "true"
      - key: WARN_COUNT
        value: "3"
      - key: PORT
        value: "3000"
