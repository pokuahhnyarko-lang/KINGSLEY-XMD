services:
  - type: web
    name: kingsley-xmd-pair
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node pair.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_ID
        sync: false
      - key: OWNER_NUMBER
        sync: false
      - key: PREFIX
        value: "."
      - key: BOT_NAME
        value: KINGSLEY-XMD
      - key: BOT_MODE
        value: public
